<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CC Store">
<meta name="theme-color" content="#1a2744">
<link rel="apple-touch-icon" href="https://cc-events-production.up.railway.app/images/icon-192.png">
<title>Cluttered Collectibles & Comics</title>
<link rel="stylesheet" href="https://cc-events-production.up.railway.app/css/app.css">
</head>
<body>
<!-- Login Screen -->
<div id="login-screen" style="display:flex;position:fixed;inset:0;background:#0d0d0d;z-index:9999;align-items:center;justify-content:center;">
  <div style="background:#111;border:1px solid #333;border-radius:10px;padding:36px 32px;width:340px;text-align:center;">
    <div style="font-size:2rem;margin-bottom:8px;">🎮</div>
    <h2 style="color:#ffc400;margin-bottom:6px;font-size:1.3rem;">CC Events Manager</h2>
    <p style="color:#666;font-size:0.85rem;margin-bottom:24px;">Cluttered Collectibles &amp; Comics</p>
    <input type="password" id="login-password" placeholder="Admin password"
      style="width:100%;background:#0d0d0d;border:1px solid #333;border-radius:6px;color:#f0f0f0;padding:10px 12px;font-size:0.9rem;margin-bottom:12px;box-sizing:border-box;"
      onkeydown="if(event.key==='Enter') submitLogin()">
    <button onclick="submitLogin()"
      style="width:100%;background:#ffc400;color:#000;border:none;border-radius:6px;padding:10px;font-weight:700;font-size:0.95rem;cursor:pointer;">
      Sign In
    </button>
    <div id="login-error" style="color:#c82323;font-size:0.82rem;margin-top:8px;"></div>
  </div>
</div>

<div id="app-shell">
<div id="app" style="display:none;">
  <nav id="sidebar">
    <div class="sidebar-header">
      <div class="logo-mark">CC</div>
      <div class="logo-text">
        <div class="logo-title">Cluttered Collectibles</div>
        <div class="logo-sub">& Comics LLC</div>
      </div>
    </div>
    <ul class="nav-links">
      <li><a href="#" data-page="dashboard"   class="nav-link active"><span class="nav-icon">⚡</span>Dashboard</a></li>
      <li><a href="#" data-page="players"     class="nav-link"><span class="nav-icon">👥</span>Players</a></li>
      <li><a href="#" data-page="tournaments" class="nav-link"><span class="nav-icon">🏆</span>Tournaments</a></li>
      <li><a href="#" data-page="events"      class="nav-link"><span class="nav-icon">📅</span>Events</a></li>
    </ul>
    <div class="sidebar-footer">
      <div class="location-badge">📍 Ignacio & Bayfield, CO</div>
    </div>
  </nav>
  <main id="content">
    <div id="page-dashboard"   class="page active"></div>
    <div id="page-players"     class="page"></div>
    <div id="page-tournaments" class="page"></div>
    <div id="page-events"      class="page"></div>
  </main>
</div>
</div><!-- end app-shell -->
<div id="modal-overlay" class="hidden">
  <div id="modal-box">
    <div id="modal-header">
      <h2 id="modal-title"></h2>
      <button id="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>
<div id="toast-container"></div>
<script src="https://cc-events-production.up.railway.app/js/api.js"></script>
<script src="https://cc-events-production.up.railway.app/js/app.js"></script>
<script>
async function submitLogin() {
  const pw = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  errEl.textContent = '';
  try {
    await doLogin(pw);
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    navigate('dashboard');
  } catch(e) {
    errEl.textContent = e.message || 'Invalid password';
  }
}

document.addEventListener('DOMContentLoaded', async () => {
  // Check if already authenticated — if so skip login
  const authed = await checkAuth();
  if (authed) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    navigate('dashboard');
  }
  // Otherwise login screen is already visible (display:flex by default)
});
</script>
</body>
</html>
